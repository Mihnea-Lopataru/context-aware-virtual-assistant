services:

  # -----------------------------
  # Backend Service
  # -----------------------------
  backend-service:
    build:
      context: ./backend_service
      dockerfile: Dockerfile

    container_name: backend-service

    ports:
      - "8000:8000"

    environment:
      - DB_USER=admin
      - DB_PASSWORD=admin
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ai_assistant

      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=llama3.1:8b

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - ./backend_service:/app

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

    restart: unless-stopped


  # -----------------------------
  # Speech Service
  # -----------------------------
  speech-service:
    build:
      context: ./speech_service
      dockerfile: Dockerfile

    container_name: speech-service

    ports:
      - "8001:8001"

    volumes:
      - ./speech_service/data/models:/app/data/models
      - ./speech_service/secrets:/app/secrets

    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/virtual-ai-assistant.json

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

    restart: unless-stopped


  # -----------------------------
  # PostgreSQL
  # -----------------------------
  postgres:
    image: postgres:15
    container_name: postgres-db

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ai_assistant

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_assistant"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped


volumes:
  postgres_data: